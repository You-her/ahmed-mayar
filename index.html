<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دعوة خطوبة | أحمد وميار</title>
    <!-- استدعاء خطوط عربية أنيقة من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات عامة تمنع ظهور أي أشرطة تمرير مزعجة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f9f6f0 0%, #e8e2d2 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden; /* لمنع الشاشة من التحرك مع تساقط الورد */
            position: relative;
        }

        /* حاوية الدعوة متجاوبة مع الشاشة */
        .wrapper {
            position: relative;
            width: 90%;
            max-width: 400px; /* أقصى عرض على الكمبيوتر */
            height: 80vh; /* تأخذ 80% من طول الشاشة */
            max-height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* ------------------ الظرف ------------------ */
        .envelope-container {
            position: absolute;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1.5 / 1; /* الحفاظ على شكل الظرف المستطيل */
            z-index: 10;
            transition: all 0.8s ease-in-out 0.5s; /* تأخير النزول حتى يفتح الغطاء */
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #d4af37;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #d4af37, #b58d22);
            z-index: 4;
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
            border-radius: 8px;
        }

        .envelope-flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #e2c25e;
            clip-path: polygon(0 0, 50% 55%, 100% 0);
            z-index: 5;
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
        }

        /* ختم الظرف */
        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: #8b0000;
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Aref Ruqaa', serif;
            font-size: 22px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid #a30000;
            transition: opacity 0.3s ease;
        }

        .click-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 15px;
            font-weight: bold;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); }
        }

        /* ------------------ الكارت الداخلي ------------------ */
        .card {
            position: absolute;
            width: 95%; /* مناسب للموبايل */
            max-width: 360px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 1;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid #f9f2e3;
            background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="%23d4af37" fill-opacity="0.05" fill-rule="evenodd"%3E%3Ccircle cx="3" cy="3" r="3"/%3E%3Ccircle cx="13" cy="13" r="3"/%3E%3C/g%3E%3C/svg%3E');
            
            /* البداية يكون الكارت مخفي ومصغر */
            transform: scale(0.7) translateY(50px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s; /* تأخير ظهوره حتى يفتح الظرف */
        }

        /* محتوى الدعوة الداخلي لتناسب الموبايل */
        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 16px;
            color: #777;
            margin-bottom: 15px;
        }

        .invite-text {
            font-size: 17px;
            color: #444;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .names {
            font-family: 'Aref Ruqaa', serif;
            font-size: 40px;
            color: #d4af37;
            margin: 15px 0;
            line-height: 1.3;
        }

        .details {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .date {
            font-weight: bold;
            color: #8b0000;
            font-size: 18px;
            margin: 8px 0;
            background: #fff5f5;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .location {
            font-weight: 500;
            margin-top: 10px;
        }

        /* ------------------ حركات الفتح ------------------ */
        .is-open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 2;
        }

        .is-open .seal {
            opacity: 0;
        }

        .is-open .envelope-container {
            transform: translateY(150px) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        .is-open .card {
            transform: scale(1) translateY(0); /* الكارت يكبر ويتوسط الشاشة */
            opacity: 1;
            z-index: 20;
            pointer-events: auto;
        }

        .is-open .click-text {
            display: none;
        }

        /* ------------------ التأثيرات المتساقطة ------------------ */
        .particle {
            position: absolute;
            top: -20px;
            pointer-events: none;
            z-index: 100;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* ------------------ تعديلات للشاشات الصغيرة جداً ------------------ */
        @media (max-height: 550px) {
            .card {
                padding: 15px;
                max-height: 90vh;
                overflow-y: auto; /* يسمح بالنزول اذا الشاشة قصيرة */
            }
            .names { font-size: 32px; }
            .details { padding-top: 10px; margin-top: 10px; }
        }

        @media (max-width: 350px) {
            .names { font-size: 32px; }
            .invite-text { font-size: 15px; }
            .details { font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- ملف الصوت -->
    <audio id="inviteMusic" loop>
        <source src="https://i.top4top.io/m_37427iqgo0.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper" id="inviteWrapper">
        
        <!-- حاوية الظرف -->
        <div class="envelope-container">
            <div class="click-text">اضغط على الظرف لفتح الدعوة ❤️</div>
            <div class="envelope">
                <div class="envelope-flap"></div>
                <div class="seal">أ&م</div>
                <div class="envelope-front"></div>
            </div>
        </div>

        <!-- كارت الدعوة (يكون مخفياً ومصغراً في البداية) -->
        <div class="card">
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div class="invite-text">نتشرف بدعوتكم لحضور حفل خطوبة</div>
            
            <div class="names">
                Ahmed <br>
                <span style="font-size: 26px; color:#8b0000;">&</span> <br>
                Mayar
            </div>
            
            <div class="details">
                يوم الجمعة الموافق
                <br>
                <div class="date">17 أبريل</div>
                <div class="location">
                    📍 المكان:<br>
                    قرية بني صالح - مركز بلبيس<br>
                    منزل العائلة على الطريق المباشر
                </div>
            </div>
        </div>

    </div>

    <script>
        const inviteWrapper = document.getElementById('inviteWrapper');
        const inviteMusic = document.getElementById('inviteMusic');
        let isOpened = false;

        inviteWrapper.addEventListener('click', function() {
            if (!isOpened) {
                // تفعيل كلاس الفتح لتبدأ الحركات
                this.classList.add('is-open');
                
                // تشغيل الموسيقى
                inviteMusic.play().catch(error => {
                    console.log("الرجاء التفاعل مع الصفحة لتشغيل الصوت");
                });

                // بدء تساقط القلوب والورد
                createParticles();
                setInterval(createParticles, 400); // كل 400 ملي ثانية ينزل ورد
                
                isOpened = true;
            }
        });

        // دالة الورد والقلوب
        function createParticles() {
            const particlesArray = ['🌸', '✨', '❤️', '💍', '🤍'];
            
            for(let i=0; i<2; i++){
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                particle.innerText = particlesArray[Math.floor(Math.random() * particlesArray.length)];
                
                const size = Math.random() * 12 + 12; 
                particle.style.fontSize = size + 'px';
                
                particle.style.left = Math.random() * 100 + 'vw';
                
                const duration = Math.random() * 4 + 4; 
                particle.style.animationDuration = duration + 's';
                
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, duration * 1000);
            }
        }
    </script>

</body>
</html>
